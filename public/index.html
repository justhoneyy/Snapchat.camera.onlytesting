<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Snapchat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; }
    #cameraVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }

    /* Custom CSS to handle native scaling differences and badging */
    
    /* 1:1 Match Badges */
    .snap-badge-pill {
      position: absolute; top: -6px; right: -10px; background: #FF3B30; color: white;
      font-size: 11px; font-weight: 800; border-radius: 20px; 
      padding: 1px 7px; display: inline-block; text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    .snap-badge-dot {
      position: absolute; top: -4px; right: -4px; width: 10px; height: 10px;
      background: #FF3B30; border-radius: 50%; border: 1.5px solid #000;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5));
    }

    /* Interactive Zoom Dial */
    .snap-zoom-pill {
      position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(10px);
      padding: 5px 12px; border-radius: 30px; display: flex; gap: 18px; font-size: 12px; font-weight: 800;
      z-index: 10; border: 1px solid rgba(255,255,255,0.05);
    }
    .zoom-text { opacity: 0.6; }
    .zoom-text.active { opacity: 1; color: #FFFC00; }

    /* Lenses & Shutter */
    .capture-row { position: fixed; bottom: 90px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 28px; z-index: 10; }
    
    /* memories icon replaced by specific svg later in code */
    .memories-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }

    .shutter-ring { width: 78px; height: 78px; border-radius: 50%; border: 5px solid white; display: flex; align-items: center; justify-content: center; background: transparent; transition: 0.1s; }
    .shutter-inner { width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    .shutter-ring:active { transform: scale(0.9); }

    .lens-icon-btn { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; border: 2.5px solid rgba(255,255,255,0.4); }

    /* Bottom Navbar translucency */
    .footer {
      position: fixed; bottom: 0; width: 100%; height: 70px;
      background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.9));
